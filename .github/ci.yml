# snapflow:step=2
name: CI/CD Build and Test

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Syntax check (compile Python files)
        run: |
          python -m py_compile app.py config.py diagnose.py search.py user.py psql.py

      - name: Check imports
        run: |
          python -c "import flask; print('Flask version:', flask.__version__)"
          python -c "import requests; print('Requests version:', requests.__version__)"
          python -c "import psycopg2; print('psycopg2 available')"
          python -c "import infermedica_api; print('Infermedica API available')"

      - name: Lint with flake8 (informational)
        continue-on-error: true
        run: |
          pip install flake8
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics || true
